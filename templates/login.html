<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TENAR — Sign in</title>
<style>
  body { margin:0; height:100vh; display:flex; align-items:center; justify-content:center;
         font-family:-apple-system,Segoe UI,Arial,sans-serif; background:#1c2330; color:#e6e9ef; }
  .card { background:#232c3d; padding:28px; border-radius:12px; width:340px;
          box-shadow:0 10px 40px rgba(0,0,0,.4); }
  h1 { font-size:18px; margin:0 0 4px; }
  p.sub { font-size:12px; color:#8b93a7; margin:0 0 18px; }
  label { display:block; font-size:12px; color:#8b93a7; margin:10px 0 3px; }
  input { width:100%; padding:9px; border-radius:6px; border:1px solid #2a3344;
          background:#11151d; color:#e6e9ef; box-sizing:border-box; font-size:14px; }
  button { width:100%; margin-top:16px; padding:10px; border:0; border-radius:6px;
           background:#3b6fe0; color:#fff; font-size:14px; cursor:pointer;
           transition:transform .06s ease, filter .12s ease; }
  button:active { transform:scale(.97); filter:brightness(.92); }
  button.busy { opacity:.7; cursor:progress; pointer-events:none; }
  .spin { display:inline-block; width:12px; height:12px; margin-right:7px; vertical-align:-1px;
          border:2px solid rgba(255,255,255,.35); border-top-color:#fff; border-radius:50%;
          animation:spin .6s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .toggle { text-align:center; margin-top:14px; font-size:12px; color:#8fb4ff; cursor:pointer; }
  #msg { color:#ff8080; font-size:12px; margin-top:10px; min-height:14px; }
  .roles { display:flex; gap:8px; }
  .role { flex:1; margin-top:0; background:#11151d; border:1px solid #2a3344; color:#8b93a7;
          padding:10px 8px; font-size:13px; line-height:1.3; }
  .role small { display:block; font-size:10px; color:#6b7488; margin-top:2px; }
  .role.sel { background:#3b6fe0; color:#fff; border-color:#3b6fe0; }
  .role.sel small { color:#dbe6ff; }
</style>
</head>
<body>
  <div class="card">
    <h1>⚖️ TENAR</h1>
    <p class="sub" id="mode">Sign in to your account</p>
    <div id="roleRow" style="display:none">
      <label>I am a…</label>
      <div class="roles">
        <button type="button" class="role sel" data-role="student">🎓 Student<small>essays, exam coach</small></button>
        <button type="button" class="role" data-role="consultant">💼 Consultant<small>research, all courses</small></button>
      </div>
    </div>
    <label>Email</label>
    <input id="email" type="email" autocomplete="username">
    <label>Password</label>
    <input id="pw" type="password" autocomplete="current-password">
    <div id="codeRow" style="display:none">
      <label>Invite code</label>
      <input id="code" type="text" autocomplete="off" placeholder="ask the owner for this">
    </div>
    <button id="go">Sign in</button>
    <div class="toggle" id="toggle">New here? Create an account</div>
    <div id="msg"></div>
  </div>
<script>
const $ = s => document.querySelector(s);
let signup = false;
let role = "student";
document.querySelectorAll(".role").forEach(b => b.onclick = () => {
  role = b.dataset.role;
  document.querySelectorAll(".role").forEach(x => x.classList.toggle("sel", x === b));
});
$("#toggle").onclick = () => {
  signup = !signup;
  $("#mode").textContent = signup ? "Create your account" : "Sign in to your account";
  $("#go").textContent = signup ? "Create account" : "Sign in";
  $("#toggle").textContent = signup ? "Have an account? Sign in" : "New here? Create an account";
  $("#codeRow").style.display = signup ? "block" : "none";
  $("#roleRow").style.display = signup ? "block" : "none";
  $("#msg").textContent = "";
};
async function submit() {
  const go = $("#go");
  if (go.classList.contains("busy")) return;
  const email = $("#email").value.trim(), password = $("#pw").value;
  const code = $("#code").value.trim();
  const label = go.innerHTML;
  go.classList.add("busy"); go.innerHTML = '<span class="spin"></span>' + label;
  try {
    const r = await fetch(signup ? "/api/signup" : "/api/login", {method:"POST",
      headers:{"Content-Type":"application/json"}, body: JSON.stringify({email, password, code, role})});
    const d = await r.json();
    if (d.ok) { location.href = "/"; return; }
    $("#msg").textContent = d.error || "Something went wrong.";
  } catch (e) { $("#msg").textContent = "Network error — try again."; }
  go.classList.remove("busy"); go.innerHTML = label;
}
$("#go").onclick = submit;
$("#pw").addEventListener("keydown", e => { if (e.key === "Enter") submit(); });
// invite link (…/?invite=CODE) → jump straight to sign-up with the code filled
const invite = new URLSearchParams(location.search).get("invite");
if (invite) { $("#toggle").click(); $("#code").value = invite; $("#email").focus(); }
</script>
</body>
</html>
